name: PostgreSQL Auto Deployment

on:
  push:
    branches:
      - Development

  workflow_dispatch:

jobs:

  validate:
    name: Validate SQL Scripts
    runs-on: windows-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check SQL Folder
        shell: powershell
        run: |

          if (-not (Test-Path "./sql")) {
            Write-Error "sql folder missing!"
            exit 1
          }

          $files = Get-ChildItem "./sql" -Filter "*.sql" | Sort-Object Name

          Write-Host "Found $($files.Count) SQL files:"

          $files | ForEach-Object {
            Write-Host " -> $($_.Name)"
          }

      - name: Install Flyway
        shell: powershell
        run: |

          Invoke-WebRequest `
            -Uri "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/12.5.0/flyway-commandline-12.5.0-windows-x64.zip" `
            -OutFile "flyway.zip"

          Expand-Archive `
            -Path "flyway.zip" `
            -DestinationPath "./flyway"

          $flyway = Get-ChildItem `
                        -Path "./flyway" `
                        -Recurse `
                        -Filter "flyway.cmd" |
                     Select-Object -First 1

          echo "FLYWAY_CMD=$($flyway.FullName)" >> $env:GITHUB_ENV

          Write-Host "Flyway Installed:"
          Write-Host $flyway.FullName

      - name: Validate SQL with Flyway
        shell: powershell
        env:
          DB_URL: jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}
          DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
          DB_PASS: ${{ secrets.POSTGREDEVPASS }}

        run: |

          & "$env:FLYWAY_CMD" `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            info

  deploy-production:
    name: Deploy PostgreSQL
    runs-on: windows-latest
    needs: validate
    environment: Production

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Flyway
        shell: powershell
        run: |

          Invoke-WebRequest `
            -Uri "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/12.5.0/flyway-commandline-12.5.0-windows-x64.zip" `
            -OutFile "flyway.zip"

          Expand-Archive `
            -Path "flyway.zip" `
            -DestinationPath "./flyway"

          $flyway = Get-ChildItem `
                        -Path "./flyway" `
                        -Recurse `
                        -Filter "flyway.cmd" |
                     Select-Object -First 1

          echo "FLYWAY_CMD=$($flyway.FullName)" >> $env:GITHUB_ENV

      - name: Run Flyway Migration
        shell: powershell
        env:
          DB_URL: jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}
          DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
          DB_PASS: ${{ secrets.POSTGREDEVPASS }}

        run: |

          Write-Host "Starting Flyway Migration..."

          & "$env:FLYWAY_CMD" -X `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            -validateOnMigrate=true `
            -baselineOnMigrate=true `
            -cleanDisabled=true `
            migrate

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Migration FAILED!"
            exit 1
          }

          Write-Host "Migration completed successfully!"

      - name: Flyway Info
        shell: powershell
        env:
          DB_URL: jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}
          DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
          DB_PASS: ${{ secrets.POSTGREDEVPASS }}

        run: |

          & "$env:FLYWAY_CMD" `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            info

      - name: Deployment Status
        shell: powershell
        run: |

          Write-Host "======================================="
          Write-Host "DEPLOYMENT COMPLETED SUCCESSFULLY"
          Write-Host "======================================="

          Write-Host "Branch : ${{ github.ref_name }}"
          Write-Host "Commit : ${{ github.sha }}"
          Write-Host "Actor  : ${{ github.actor }}"