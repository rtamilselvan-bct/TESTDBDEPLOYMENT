

name: Flyway Auto Deployment

on:
  push:
    branches:
      - Development

jobs:
  deploy:
    runs-on: self-hosted

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # Download Flyway (Windows version)
      - name: Install Flyway
        run: |
          Invoke-WebRequest `
            -Uri "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/9.22.3/flyway-commandline-9.22.3-windows-x64.zip" `
            -OutFile "flyway.zip"

          Expand-Archive -Path flyway.zip -DestinationPath .

      # Run Flyway migrations
      - name: Run Flyway Migration
        run: |
          .\flyway-9.22.3\flyway.cmd -X `
            -url="jdbc:postgresql://localhost:5432/postgres" `
            -user="${{ secrets.POSTGREDEVUSERNAME }}" `
            -password="${{ secrets.POSTGREDEVPASS }}" `
            -locations="filesystem:./sql" `
            migrate