name: PostgreSQL Auto Deployment

on:
  push:
    branches:
      - Development

  workflow_dispatch:

jobs:

  # ✅ JOB 1 — Validate
  validate:
    name: Validate SQL Scripts
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Check SQL folder
      - name: Check SQL Folder
        run: |
          if (-not (Test-Path "./sql")) {
            Write-Error "sql folder missing!"
            exit 1
          }

          $files = Get-ChildItem "./sql" -Filter "*.sql" | Sort-Object Name
          Write-Host "Found $($files.Count) SQL files:"
          $files | ForEach-Object { Write-Host " -> $($_.Name)" }

      # ✅ Validate scripts using LOCAL Flyway
      - name: Validate SQL with Flyway
        env:
          DB_URL: jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}
          DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
          DB_PASS: ${{ secrets.POSTGREDEVPASS }}
        run: |
          $flyway = "C:\Users\tr117372\flyway\flyway\flyway-10.15.0\flyway.cmd"

          & $flyway `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            info

          Write-Host "Validation complete"

  # ✅ JOB 2 — Deploy
  deploy-production:
    name: Deploy to PostgreSQL (Production)
    runs-on: self-hosted
    needs: validate
    environment: Production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Show scripts
      - name: Show Files Being Deployed
        run: |
          Write-Host "Scripts to deploy:"
          Get-ChildItem "./sql" -Filter "*.sql" |
            Sort-Object Name |
            ForEach-Object { Write-Host " -> $($_.Name)" }

      # ✅ Run migration using LOCAL Flyway
      - name: Run Flyway Migration
        env:
          DB_URL: jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}
          DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
          DB_PASS: ${{ secrets.POSTGREDEVPASS }}
        run: |
          $flyway = "C:\Users\tr117372\flyway\flyway\flyway-10.15.0\flyway.cmd"

          Write-Host "Running migration..."

          & $flyway -X `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            -validateOnMigrate=true `
            migrate

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Migration FAILED!"
            exit 1
          }

          Write-Host "Migration completed successfully!"

      # ✅ Final status
      - name: Show Final Status
        env:
          DB_URL: jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}
          DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
          DB_PASS: ${{ secrets.POSTGREDEVPASS }}
        run: |
          $flyway = "C:\Users\tr117372\flyway\flyway\flyway-10.15.0\flyway.cmd"

          & $flyway `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            info

          Write-Host "DEPLOYMENT COMPLETE"
          Write-Host "Branch: ${{ github.ref_name }}"
          Write-Host "Commit: ${{ github.sha }}"
          Write-Host "By: ${{ github.actor }}"

      # ✅ Failure handler
      - name: On Failure
        if: failure()
        run: |
          Write-Host "DEPLOYMENT FAILED"
          Write-Host "Check logs above"