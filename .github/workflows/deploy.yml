name: Flyway Auto Deployment

on:
  push:
    branches:
      - Development

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Show Files
        run: |
          pwd
          ls -R

      - name: Install Flyway
        run: |
          wget https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/9.22.3/flyway-commandline-9.22.3-linux-x64.tar.gz
          tar -xzf flyway-commandline-9.22.3-linux-x64.tar.gz
          chmod +x flyway-9.22.3/flyway
          sudo ln -s $(pwd)/flyway-9.22.3/flyway /usr/local/bin/flyway

      - name: Verify Flyway
        run: |
          which flyway
          flyway -v

      - name: Run Migration
        run: |
          flyway -X \
            -url="${{ secrets.DEVPOSTGRESCON }}" \
            -user="${{ secrets.POSTGREDEVUSERNAME }}" \
            -password="${{ secrets.POSTGREDEVPASS }}" \
            -locations="filesystem:./sql" \
            migrate