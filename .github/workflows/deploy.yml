name: PostgreSQL Auto Deployment

on:
  push:
    branches:
      - Development
  workflow_dispatch:

jobs:
# =========================================================
# VALIDATION JOB
# =========================================================
  validate:
    name: Validate SQL Scripts
    runs-on: self-hosted
    env:
      DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
      DB_PASS: ${{ secrets.POSTGREDEVPASS }}
      DB_URL: "jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Setup Flyway
        shell: powershell
        run: |
          $url = "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/10.15.0/flyway-commandline-10.15.0-windows-x64.zip"
          $dest = "$env:TEMP\flyway.zip"
          $extractPath = "$env:USERPROFILE\flyway-temp"
          
          Write-Output "Downloading Flyway..."
          Invoke-WebRequest -Uri $url -OutFile $dest
          
          if (Test-Path $extractPath) { Remove-Item $extractPath -Recurse -Force }
          
          Write-Output "Extracting Flyway..."
          Expand-Archive -Path $dest -DestinationPath $extractPath
          
          # Add to the current session path
          $flywayBin = Get-ChildItem -Path "$extractPath\flyway-*" -Directory | Select-Object -First 1
          echo "$($flywayBin.FullName)" >> $env:GITHUB_PATH
          Write-Output "Flyway added to path"

      - name: Validate SQL with Flyway
        shell: powershell
        run: |
          # Wait a second for PATH to refresh
          flyway `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            info

# =========================================================
# DEPLOYMENT JOB
# =========================================================
  deploy-production:
    name: Deploy to PostgreSQL
    runs-on: self-hosted
    needs: validate
    environment: Production
    env:
      DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
      DB_PASS: ${{ secrets.POSTGREDEVPASS }}
      DB_URL: "jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Setup Flyway
        shell: powershell
        run: |
          $url = "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/10.15.0/flyway-commandline-10.15.0-windows-x64.zip"
          $dest = "$env:TEMP\flyway_deploy.zip"
          $extractPath = "$env:USERPROFILE\flyway-temp-deploy"
          Invoke-WebRequest -Uri $url -OutFile $dest
          if (Test-Path $extractPath) { Remove-Item $extractPath -Recurse -Force }
          Expand-Archive -Path $dest -DestinationPath $extractPath
          $flywayBin = Get-ChildItem -Path "$extractPath\flyway-*" -Directory | Select-Object -First 1
          echo "$($flywayBin.FullName)" >> $env:GITHUB_PATH

      - name: Run Flyway Migration
        shell: powershell
        run: |
          flyway -X `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            -validateOnMigrate=true `
            -baselineOnMigrate=true `
            -cleanDisabled=true `
            migrate

      - name: On Failure
        if: failure()
        shell: powershell
        run: |
          Write-Output "---------------------------------------"
          Write-Output "DEPLOYMENT FAILED"
          Write-Output "---------------------------------------"