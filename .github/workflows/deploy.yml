name: PostgreSQL Auto Deployment

on:
  push:
    branches:
      - Development

  workflow_dispatch:

jobs:

  # ✅ JOB 1 — Validate
  validate:
    name: Validate SQL Scripts
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Install Flyway dynamically
      - name: Install Flyway
        run: |
          Invoke-WebRequest `
            -Uri "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/10.15.0/flyway-commandline-10.15.0-windows-x64.zip" `
            -OutFile "flyway.zip"

          Expand-Archive -Path flyway.zip -DestinationPath . -Force
          Rename-Item "flyway-10.15.0" "flyway"

      # ✅ Check SQL folder
      - name: Check SQL Folder
        run: |
          if (-not (Test-Path "./sql")) {
            Write-Error "sql folder missing!"
            exit 1
          }
          $files = Get-ChildItem "./sql" -Filter "*.sql" | Sort-Object Name
          Write-Host "Found $($files.Count) SQL files:"
          $files | ForEach-Object { Write-Host " -> $($_.Name)" }

      # ✅ Validate scripts
      - name: Validate SQL with Flyway
        run: |
          .\flyway\flyway.cmd `
            -url="jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}" `
            -user="${{ secrets.POSTGREDEVUSERNAME }}" `
            -password="${{ secrets.POSTGREDEVPASS }}" `
            -locations="filesystem:./sql" `
            info

          Write-Host "Validation complete"

  # ✅ JOB 2 — Deploy (with approval)
  deploy-production:
    name: Deploy to PostgreSQL (Production)
    runs-on: self-hosted
    needs: validate
    environment: Production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ✅ Install Flyway again (fresh job)
      - name: Install Flyway
        run: |
          Invoke-WebRequest `
            -Uri "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/10.15.0/flyway-commandline-10.15.0-windows-x64.zip" `
            -OutFile "flyway.zip"

          Expand-Archive -Path flyway.zip -DestinationPath . -Force
          Rename-Item "flyway-10.15.0" "flyway"

      # ✅ Show scripts
      - name: Show Files Being Deployed
        run: |
          Write-Host "Scripts to deploy:"
          Get-ChildItem "./sql" -Filter "*.sql" |
            Sort-Object Name |
            ForEach-Object { Write-Host " -> $($_.Name)" }

      # ✅ Run migration
      - name: Run Flyway Migration
        run: |
          Write-Host "Running migration..."

          .\flyway\flyway.cmd -X `
            -url="jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}" `
            -user="${{ secrets.POSTGREDEVUSERNAME }}" `
            -password="${{ secrets.POSTGREDEVPASS }}" `
            -locations="filesystem:./sql" `
            -validateOnMigrate=true `
            migrate

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Migration FAILED!"
            exit 1
          }

          Write-Host "Migration completed successfully!"

      # ✅ Final status
      - name: Show Final Status
        run: |
          .\flyway\flyway.cmd `
            -url="jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}" `
            -user="${{ secrets.POSTGREDEVUSERNAME }}" `
            -password="${{ secrets.POSTGREDEVPASS }}" `
            -locations="filesystem:./sql" `
            info

          Write-Host "DEPLOYMENT COMPLETE"
          Write-Host "Branch: ${{ github.ref_name }}"
          Write-Host "Commit: ${{ github.sha }}"
          Write-Host "By: ${{ github.actor }}"

      # ✅ Failure handler
      - name: On Failure
        if: failure()
        run: |
          Write-Host "DEPLOYMENT FAILED"
          Write-Host "Check logs above"
