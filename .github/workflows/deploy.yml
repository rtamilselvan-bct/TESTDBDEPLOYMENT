name: PostgreSQL Auto Deployment

on:
  push:
    branches:
      - Development

  workflow_dispatch:

jobs:

  # ✅ JOB 1 — Validate
  validate:
    name: Validate SQL Scripts
    runs-on: windows-latest

    steps:

      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # INSTALL FLYWAY
      # =========================
      - name: Install Flyway
        shell: powershell
        run: |

          Write-Host "Downloading Flyway..."

          Invoke-WebRequest `
            -Uri "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/9.22.3/flyway-commandline-9.22.3-windows-x64.zip" `
            -OutFile "flyway.zip"

          Write-Host "Extracting Flyway..."

          Expand-Archive `
            -Path "flyway.zip" `
            -DestinationPath "./flyway"

          $flyway = Get-ChildItem `
                        -Path "./flyway" `
                        -Recurse `
                        -Filter "flyway.cmd" |
                     Select-Object -First 1

          if (-not $flyway) {
            Write-Error "flyway.cmd not found!"
            exit 1
          }

          Write-Host "Flyway installed:"
          Write-Host $flyway.FullName

      # =========================
      # CHECK SQL FOLDER
      # =========================
      - name: Check SQL Folder
        shell: powershell
        run: |

          if (-not (Test-Path "./sql")) {
            Write-Error "sql folder missing!"
            exit 1
          }

          $files = Get-ChildItem "./sql" -Filter "*.sql" | Sort-Object Name

          Write-Host "Found $($files.Count) SQL files:"

          $files | ForEach-Object {
            Write-Host " -> $($_.Name)"
          }

      # =========================
      # VALIDATE SQL
      # =========================
      - name: Validate SQL with Flyway
        shell: powershell
        env:
          DB_URL: jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}
          DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
          DB_PASS: ${{ secrets.POSTGREDEVPASS }}

        run: |

          $flyway = (
            Get-ChildItem "./flyway" `
              -Recurse `
              -Filter "flyway.cmd" |
            Select-Object -First 1
          ).FullName

          & $flyway `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            info

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Validation FAILED!"
            exit 1
          }

          Write-Host "Validation complete"

  # ✅ JOB 2 — Deploy
  deploy-production:
    name: Deploy to PostgreSQL (Production)
    runs-on: self-hosted
    needs: validate
    environment: Production

    steps:

      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # INSTALL FLYWAY
      # =========================
      - name: Install Flyway
        shell: powershell
        run: |

          Write-Host "Downloading Flyway..."

          Invoke-WebRequest `
            -Uri "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/9.22.3/flyway-commandline-9.22.3-windows-x64.zip" `
            -OutFile "flyway.zip"

          Write-Host "Extracting Flyway..."

          Expand-Archive `
            -Path "flyway.zip" `
            -DestinationPath "./flyway"

      # =========================
      # SHOW FILES
      # =========================
      - name: Show Files Being Deployed
        shell: powershell
        run: |

          Write-Host "Scripts to deploy:"

          Get-ChildItem "./sql" -Filter "*.sql" |
            Sort-Object Name |
            ForEach-Object {
              Write-Host " -> $($_.Name)"
            }

      # =========================
      # RUN MIGRATION
      # =========================
      - name: Run Flyway Migration
        shell: powershell
        env:
          DB_URL: jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}
          DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
          DB_PASS: ${{ secrets.POSTGREDEVPASS }}

        run: |

          $flyway = (
            Get-ChildItem "./flyway" `
              -Recurse `
              -Filter "flyway.cmd" |
            Select-Object -First 1
          ).FullName

          Write-Host "Running migration..."

          & $flyway -X `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            -validateOnMigrate=true `
            migrate

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Migration FAILED!"
            exit 1
          }

          Write-Host "Migration completed successfully!"

      # =========================
      # FINAL STATUS
      # =========================
      - name: Show Final Status
        shell: powershell
        env:
          DB_URL: jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}
          DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
          DB_PASS: ${{ secrets.POSTGREDEVPASS }}

        run: |

          $flyway = (
            Get-ChildItem "./flyway" `
              -Recurse `
              -Filter "flyway.cmd" |
            Select-Object -First 1
          ).FullName

          & $flyway `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            info

          Write-Host "======================================="
          Write-Host "DEPLOYMENT COMPLETE"
          Write-Host "======================================="
          Write-Host "Branch: ${{ github.ref_name }}"
          Write-Host "Commit: ${{ github.sha }}"
          Write-Host "By: ${{ github.actor }}"

      # =========================
      # FAILURE HANDLER
      # =========================
      - name: On Failure
        if: failure()
        shell: powershell
        run: |

          Write-Host "======================================="
          Write-Host "DEPLOYMENT FAILED"
          Write-Host "======================================="
          Write-Host "Check logs above"