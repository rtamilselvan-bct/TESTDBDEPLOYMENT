name: PostgreSQL Auto Deployment

on:
  push:
    branches:
      - Development
  workflow_dispatch:

jobs:
# =========================================================
# VALIDATION JOB
# =========================================================
  validate:
    name: Validate SQL Scripts
    runs-on: self-hosted
    env:
      DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
      DB_PASS: ${{ secrets.POSTGREDEVPASS }}
      DB_URL: "jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Download & Setup Flyway ──────────────────────────
      - name: Install Flyway
        uses: red-gate/setup-flyway@v3
        with:
          version: '10.15.0' # Matches your original version
          edition: 'community'
          i-agree-to-the-eula: true

      - name: Test PostgreSQL Connection
        shell: powershell
        run: |
          $test = Test-NetConnection -ComputerName localhost -Port 5432 -WarningAction SilentlyContinue
          if (-not $test.TcpTestSucceeded) {
            Write-Error "PostgreSQL NOT reachable on localhost:5432"
            exit 1
          }

      - name: Validate SQL with Flyway
        shell: powershell
        run: |
          # Use 'flyway' directly as it is now in the PATH
          flyway `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            info
          if ($LASTEXITCODE -ne 0) { exit 1 }

# =========================================================
# DEPLOYMENT JOB
# =========================================================
  deploy-production:
    name: Deploy to PostgreSQL
    runs-on: self-hosted
    needs: validate
    environment: Production
    env:
      DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
      DB_PASS: ${{ secrets.POSTGREDEVPASS }}
      DB_URL: "jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Download & Setup Flyway (Required in each job) ───
      - name: Install Flyway
        uses: red-gate/setup-flyway@v3
        with:
          version: '10.15.0'
          edition: 'community'
          i-agree-to-the-eula: true

      - name: Run Flyway Migration
        shell: powershell
        run: |
          Write-Output "STARTING MIGRATION"
          flyway -X `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            -validateOnMigrate=true `
            -baselineOnMigrate=true `
            -cleanDisabled=true `
            migrate
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: On Failure
        if: failure()
        shell: powershell
        run: |
          Write-Output "---------------------------------------"
          Write-Output "DEPLOYMENT FAILED"
          Write-Output "---------------------------------------"