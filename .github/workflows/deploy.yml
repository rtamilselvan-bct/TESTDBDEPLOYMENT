name: PostgreSQL Auto Deployment

on:
  push:
    branches:
      - Development

  workflow_dispatch:

jobs:

# =========================================================
# VALIDATION JOB
# =========================================================
  validate:
    name: Validate SQL Scripts
    runs-on: windows-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------
      # CHECK SQL FILES
      # -------------------------
      - name: Check SQL Folder
        shell: powershell
        run: |

          if (-not (Test-Path "./sql")) {
            Write-Error "sql folder missing!"
            exit 1
          }

          $files = Get-ChildItem "./sql" -Filter "*.sql" | Sort-Object Name

          Write-Host "Found $($files.Count) SQL files:"
          $files | ForEach-Object { Write-Host " -> $($_.Name)" }

      # -------------------------
      # INSTALL FLYWAY
      # -------------------------
      - name: Install Flyway
        shell: powershell
        run: |

          Write-Host "Downloading Flyway 10.15.0..."

          Invoke-WebRequest `
            -Uri "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/10.15.0/flyway-commandline-10.15.0-windows-x64.zip" `
            -OutFile "flyway.zip"

          Expand-Archive `
            -Path "flyway.zip" `
            -DestinationPath "./flyway"

          $flyway = Get-ChildItem `
                        -Path "./flyway" `
                        -Recurse `
                        -Filter "flyway.cmd" |
                     Select-Object -First 1

          echo "FLYWAY_CMD=$($flyway.FullName)" >> $env:GITHUB_ENV

          Write-Host "Flyway installed at:"
          Write-Host $flyway.FullName

      # -------------------------
      # VALIDATE SQL (FLYWAY)
      # -------------------------
      - name: Validate SQL with Flyway
        shell: powershell
        env:
          DB_URL: jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}
          DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
          DB_PASS: ${{ secrets.POSTGREDEVPASS }}

        run: |

          & "$env:FLYWAY_CMD" `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            info

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Validation failed!"
            exit 1
          }

          Write-Host "Validation completed successfully"

# =========================================================
# DEPLOYMENT JOB
# =========================================================
  deploy-production:
    name: Deploy to PostgreSQL (Production)
    runs-on: windows-latest
    needs: validate
    environment: Production

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------
      # INSTALL FLYWAY
      # -------------------------
      - name: Install Flyway
        shell: powershell
        run: |

          Write-Host "Downloading Flyway 10.15.0..."

          Invoke-WebRequest `
            -Uri "https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/10.15.0/flyway-commandline-10.15.0-windows-x64.zip" `
            -OutFile "flyway.zip"

          Expand-Archive `
            -Path "flyway.zip" `
            -DestinationPath "./flyway"

          $flyway = Get-ChildItem `
                        -Path "./flyway" `
                        -Recurse `
                        -Filter "flyway.cmd" |
                     Select-Object -First 1

          echo "FLYWAY_CMD=$($flyway.FullName)" >> $env:GITHUB_ENV

      # -------------------------
      # SHOW FILES
      # -------------------------
      - name: Show Files
        shell: powershell
        run: |

          Write-Host "SQL Files to deploy:"
          Get-ChildItem "./sql" -Filter "*.sql" |
            Sort-Object Name |
            ForEach-Object { Write-Host " -> $($_.Name)" }

      # -------------------------
      # RUN MIGRATION
      # -------------------------
      - name: Run Flyway Migration
        shell: powershell
        env:
          DB_URL: jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}
          DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
          DB_PASS: ${{ secrets.POSTGREDEVPASS }}

        run: |

          Write-Host "Starting Migration..."

          & "$env:FLYWAY_CMD" -X `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            -validateOnMigrate=true `
            -baselineOnMigrate=true `
            -cleanDisabled=true `
            migrate

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Migration failed!"
            exit 1
          }

          Write-Host "Migration successful!"

      # -------------------------
      # FINAL STATUS
      # -------------------------
      - name: Flyway Info
        shell: powershell
        env:
          DB_URL: jdbc:postgresql://localhost:5432/${{ secrets.POSTGREDEVDB }}
          DB_USER: ${{ secrets.POSTGREDEVUSERNAME }}
          DB_PASS: ${{ secrets.POSTGREDEVPASS }}

        run: |

          & "$env:FLYWAY_CMD" `
            -url="$env:DB_URL" `
            -user="$env:DB_USER" `
            -password="$env:DB_PASS" `
            -locations="filesystem:./sql" `
            info

          Write-Host "======================================="
          Write-Host "DEPLOYMENT COMPLETED SUCCESSFULLY"
          Write-Host "======================================="
          Write-Host "Branch: ${{ github.ref_name }}"
          Write-Host "Commit: ${{ github.sha }}"
          Write-Host "Actor: ${{ github.actor }}"

      # -------------------------
      # FAILURE HANDLER
      # -------------------------
      - name: On Failure
        if: failure()
        shell: powershell
        run: |

          Write-Host "======================================="
          Write-Host "DEPLOYMENT FAILED"
          Write-Host "======================================="